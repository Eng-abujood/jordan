<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> تراث بلادي</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --main-bg: #0f172a; /* كحلي غامق جداً */
            --card-bg: #1e293b; /* كحلي فاتح للبطاقات */
            --accent: #fbbf24;  /* ذهبي مشرق */
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
            --white: #ffffff;
        }

        /* إضافة منع تحديد النص هنا */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Tajawal', sans-serif; 
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body { background-color: var(--main-bg); color: var(--text-light); line-height: 1.6; }

        header { 
            background: var(--card-bg);
            padding: 40px 20px; text-align: center;
            border-bottom: 4px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        header h1 { color: var(--accent); font-size: 2.5rem; margin-bottom: 10px; }

        /* الصفحات */
        .page { display: none; padding: 40px 20px; max-width: 1200px; margin: auto; min-height: 80vh; }
        .active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* القائمة الرئيسية */
        .home-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px;
        }

        .nav-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; padding-bottom: 20px;
        }

        .nav-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .nav-card img { width: 100%; height: 200px; object-fit: cover; }
        .nav-card h3 { margin-top: 15px; color: var(--white); }

        /* الصفحات الداخلية */
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .back-btn { 
            background: var(--accent); color: var(--main-bg); border: none; 
            padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; 
        }

        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        .menu-list { display: flex; flex-direction: column; gap: 15px; }
        
        .item-btn {
            background: var(--card-bg); padding: 20px; border-radius: 12px;
            cursor: pointer; border: 2px solid transparent; transition: 0.3s;
        }
        .item-btn:hover, .item-btn.active-item { border-color: var(--accent); background: rgba(251, 191, 36, 0.1); }

        .display-box { background: var(--card-bg); padding: 30px; border-radius: 20px; text-align: center; }
        .display-box img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 15px; margin-bottom: 20px; display: none; border: 3px solid var(--accent); }
        .display-box p { color: var(--text-dim); font-size: 1.1rem; }

        footer { 
            background: #1e293b; color: var(--white); text-align: center; 
            padding: 20px 20px; margin-top: 100px; border-top: 1px solid var(--card-bg);
        }
        .footer-content { line-height: 2; }
        .footer-content strong { color: var(--accent); }

        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>استكشف الأردن حيث الاصالة و العراقة اجتمعت في مكان واحد</h1>
</header>

<div id="home" class="page active">
    <div class="home-grid">
        <div class="nav-card" onclick="openSection('recreational')">
            <img src="استجمامية.jpg" alt="استجمام">
            <h3>السياحة الاستجمامية</h3>
        </div>
        <div class="nav-card" onclick="openSection('medical')">
            <img src="ugh[.jpg" alt="علاج">
            <h3>السياحة العلاجية</h3>
        </div> 
        <div class="nav-card" onclick="openSection('educational')">
            <img src="jugdl.jpg" alt="تعليم">
            <h3>السياحة التعليمية</h3>
        </div>
        <div class="nav-card" onclick="openSection('entertainment')">
            <img src="jvtdi.jpg" alt="ترفيه">
            <h3>السياحة الترفيهية</h3>
        </div>
        <div class="nav-card" onclick="openSection('food')">
            <img src="h;g.jpg" alt="أكل">
            <h3>أشهر الأكلات الأردنية</h3>
        </div>
        <div class="nav-card" onclick="openSection('historical')">
            <img src="hec.jpg" alt="آثار">
            <h3>المواقع الأثرية</h3>
        </div>
    </div>
</div>

<div id="subPage" class="page">
    <div class="page-header">
        <h2 id="pageTitle" style="color: var(--accent);"></h2>
        <button class="back-btn" onclick="goHome()">🏠 رجوع للرئيسية</button>
    </div>
    <div class="layout">
        <div id="sideMenu" class="menu-list"></div>
        <div class="display-box">
            <img id="mainImg" src="" alt="الموقع">
            <h3 id="itemName" style="margin-bottom: 15px; color: var(--accent);"></h3>
            <p id="itemDesc"></p>
        </div>
    </div>
</div>

<footer>
    <div class="footer-content">
        <p>تصميم وإعداد:</p>
        <p>الطالب: <strong>محمد محمد جهاد خياط</strong></p>
        <p>التخصص: <strong>هندسة البرمجيات</strong></p>
        <p>جميع الحقوق محفوظة لدى: <strong>المهندس محمد خياط</strong></p>

    </div>
</footer>

<script>
    const siteData = {
        recreational: {
            title: "السياحة الاستجمامية",
            items: [
                { name: "البحر الميت", desc: "البحر الميت هو بحيرة ملحية مغلقة تقع في أخدود وادي الأردن ضمن الشق السوري الأفريقي، على خط الحدود الفاصل بين الأردن وفلسطين التاريخية (الضفة الغربية والداخل المحتل). يشتهر البحر الميت بأنه أخفض نقطة على سطح الكرة الأرضية، حيث بلغ منسوب شاطئه حوالي 400 متر تحت مستوى سطح البحر حسب سجلات عام 2013. كما يتميز البحر الميت بشدة ملوحته، إذ تبلغ نسبة الأملاح فيه حوالي 34%، وهي ما تمثل تسعة أضعاف تركيز الأملاح في البحر المتوسط، وواحدة من أعلى نسب الملوحة بالمسطحات المائية في العالم. وقد نتجت هذه الأملاح لأن البحيرة هي وجهة نهائية للمياه التي تصب فيه، حيث أنه لا يوجد أي مخرج لها بعده.", img: "بحر.jpg" },
                { name: "وادي رم", desc: "وادي رم هو صحراء متنوعة التضاريس يسوده المناخ الصحرواي ويقع ضمن حدود صحراء حِسمى وهي واحدة من أكثر الصحارى جمالًا في العالم، وتتميز جبالها الصخرية بألوانها البيضاء والصفراء والحمراء والبنية، وبتشكيلاتها الجغرافية المميزة. يحتوي وادي رم على مجموعة من الأودية الضيقة والأقواس الطبيعية والمنحدرات الشاهقة والطرق المنحدرة، فضلاً عن أكوام كبيرة من الصخور المنهارة وعدد من الكهوف والآلاف من المنحوتات الصخرية والنقوش، كما يضم أعلى القمم الجبلية في جنوب بلاد الشام وهما: جبل أم الدامي وجبل رم.", img: "واديرم.jpg" },
                { name: "العقبة", desc: "العقبة هي المدينة الساحلية الوحيدة في الأردن، والمدينة الأكبر والأكثر سكانا بين مدن خليج العقبة جميعها. تقع العقبة في أقصى جنوب المملكة الأردنيّة الهاشميّة على ساحل البحر الأحمر، وهي مركز محافظة العقبة. تبعد المدينة حوالي 330 كيلومتر جنوب العاصمة الأردنية عمّان. وقد بلغ عدد سكانها في عام 2015 حوالي 148,398 نسمة، حيث تُعد خامس أكبر مدينة في المملكة. وتبلغ مساحة المدينة 375 كيلومتر مربع (144.8 ميل2). وللعقبة دور كبير في الاقتصاد الوطني الأردني وتطويره؛ وذلك من خلال كل من القطاعين التجاري والسياحي. ويُذكر أن ميناء العقبة يعد معبرا بحريا مهما للدول الأخرى المجاورة للأردن كذلك.", img: "العقبة.jpg" }
            ]
        },
        medical: {
            title: "السياحة العلاجية",
            items: [
                { name: "حمامات ماعين", desc: "تقع حمّامات ماعين على بعد 58 كيلو متراً جنوبي عمّان في محافظة مادبا، وتبعد عن مدينة مادبا 27 كيلومتر. وهي منطقة تنخفض 120 مترا عن سطح البحر. تحتوي منطقة ماعين على مجموعة من الينابيع يصل عددها إلى 63 نبعاً بدرجات حرارة مختلفة ولكنها متشابهة في تركيبتها الكيميائية، إذ تحتوي على عناصر مهمة كالصوديوم والكالسيوم والكلوريد وغاز الرادون وكبريتيد الهيدروجين وغاز ثاني أوكسيد الكربون. وتصل درجات الحرارة في بعض الينابيع إلى 63 درجة مئوية", img: "lhudk.jpg" },
                { name: "مركز فرح الطبي", desc: "صرح طبي متطور يضع الأردن على خارطة الطب العالمية بجودة الخدمات والتقنيات.", img: "فرح.jpg" }
            ]
        },
        educational: {
            title: "السياحة التعليمية",
            items: [
                { name: "الجامعة الأردنية", desc: "الجامعة الأردنية (JU) هي أقدم وأكبر جامعة حكومية في الأردن، تأسست عام 1962 في عمان (لواء الجامعة) وتُعرف بـ (الجامعة الأم). تحظى بتصنيف 5 نجوم (QS) وتُصنف ضمن أفضل 350 جامعة عالمياً (المرتبة 324 عام 2026)، وتضم 25 كلية تقدم تخصصات متنوعة علمية وطبية وإنسانية", img: "hlum.jpg" },
                { name: "اللغة العربية للأجانب", desc: "يُعتبر الأردن وجهة عالمية بارزة لتعليم اللغة العربية للأجانب؛ نظراً لتميز اللهجة الأردنية (اللفظية أو الشامية) بقربها من اللغة العربية الفصحى، فضلاً عن الأمان وسهولة الاندماج في المجتمع المحلي", img: "uvfd.jpg" }
            ]
        },
        entertainment: {
            title: "السياحة الترفيهية",
            items: [
                { name: "البوليفارد - العبدلي", desc: "الوجهة العصرية للتسوق والترفيه، حيث تجتمع الحداثة بالفخامة في عمان.", img: "f,gdthv].jpg" },
                { name: "المدرج الروماني", desc: "المدرج الروماني مسرح روماني يقع في الجزء الشرقي من العاصمة الأردنية عمّان بالتحديد على سفح جبل الجوفة على أحد التلال المقابلة لقلعة عمان. تشير كتابة يونانية موجودة على إحدى منصات الأعمدة إلى أن هذا المدرج قد بُني إكراماً للإمبراطور أنطونيوس بيوس الذي زار عمان سنة 130م. تقع إلى جانب المدرج ساحة الفورم وتبلغ مساحتهما معا ما مجموعه 7,600 متر2 ويعود تاريخ بنائها على الأرجح إلى القرن الثاني الميلادي وتحديدا بين عامي 138م و161م إبان عهد الإمبراطور الروماني أنطونيوس بيوس.", img: "v,lhkd.jpg" }
            ]
        },
        food: {
            title: "المطبخ الأردني",
            items: [
                { name: "المنسف", desc: "المنسف هو ثريد لحم الضأن ولبن وخبز القمح البلدي أو الأرز، ويعد أشهر الأطباق في فلسطين و الأردن، وتمتد لتشمل منطقة بادية الشام الواقعة بين العراق والأردن وجنوب سوريا وشمال السعودية، ويعتبر الأردنيون الأشهر بإعداده، فهو الطبق الوطني في الأردن، فيطبخ بالأعراس والأفراح ومختلف المناسبات. يتميز المنسف عن باقي أنواع الطبخ العربية باستخدام لبن الجميد الأقط الذي يصنع من الحليب بعد تحويله إلى لبن رائب و يتكون الطبق من لحم الضأن مع سائل الجميد والأرز.", img: "lkst.jpg" },
                { name: "الزرب", desc: "الزرب هو أسلوب طبخ تراثي بدوي عريق، يُطهى فيه اللحم أو الدجاج مع الأرز والخضار ببطء داخل حفرة في الأرض (أو برميل خاص) مليئة بالجمر، حيث يُغطى ويُدفن لينضج بحرارته الذاتية. تشتهر هذه الأكلة في الأردن وفلسطين وبادية الشام، وتعتبر تجربة طعام كاملة، فخمة، وذات نكهة مميزة.", img: "zarb.jpg" }
            ]
        },
        historical: {
            title: "المواقع الأثرية",
            items: [
                { name: "البتراء", desc: "البتراء، أو المدينة الوردية، هي مدينة أثرية وتاريخية عريقة تقع في جنوب الأردن (محافظة معان). تأسست عام 312 ق.م كعاصمة للأنباط، وتتميز بنحتها الكامل في الصخور الوردية الحمراء، وهي واحدة من عجائب الدنيا السبع الجديدة، وتعد أبرز المواقع السياحية في الأردن ومركزاً حضارياً قديماً", img: "batra.jpg" },
                { name: "جرش", desc: "جرش، أو بومبي الشرق، هي مدينة أثرية أردنية شمال عمان، تعتبر من أفضل المدن الرومانية المحافظ عليها عالمياً خارج إيطاليا. اشتهرت قديماً باسم جراسا (Gerasa) وكانت إحدى مدن الـ ديكابولس العشر. تضم آثاراً تمتد لأكثر من 6500 عام، وتشتهر بشوارعها المعبدة والأعمدة والمسارح", img: "جرش.jpg" }
            ]
        }
    };

    function openSection(id) {
        document.getElementById('home').classList.remove('active');
        const section = siteData[id];
        document.getElementById('pageTitle').innerText = section.title;
        const menu = document.getElementById('sideMenu');
        menu.innerHTML = '';

        document.getElementById('mainImg').style.display = 'none';
        document.getElementById('itemName').innerText = 'اختر من القائمة';
        document.getElementById('itemDesc').innerText = 'اضغط على أحد الخيارات لعرض التفاصيل والصور.';

        section.items.forEach((item, index) => {
            const btn = document.createElement('div');
            btn.className = 'item-btn';
            btn.innerText = item.name;
            btn.onclick = () => {
                document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('active-item'));
                btn.classList.add('active-item');
                const img = document.getElementById('mainImg');
                img.src = item.img;
                img.style.display = 'block';
                document.getElementById('itemName').innerText = item.name;
                document.getElementById('itemDesc').innerText = item.desc;
            };
            menu.appendChild(btn);
        });

        document.getElementById('subPage').classList.add('active');
        window.scrollTo(0,0);
    }

    function goHome() {
        document.getElementById('subPage').classList.remove('active');
        document.getElementById('home').classList.add('active');
    }

    // منع الزر الأيمن للفأرة
    document.addEventListener('contextmenu', event => event.preventDefault());
</script>

</body>
</html>
