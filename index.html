<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> تراث بلادي</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --main-bg: #0f172a; /* كحلي غامق جداً */
            --card-bg: #1e293b; /* كحلي فاتح للبطاقات */
            --accent: #fbbf24;  /* ذهبي مشرق */
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background-color: var(--main-bg); color: var(--text-light); line-height: 1.6; }

        header { 
            background: var(--card-bg);
            padding: 40px 20px; text-align: center;
            border-bottom: 4px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        header h1 { color: var(--accent); font-size: 2.5rem; margin-bottom: 10px; }

        /* الصفحات */
        .page { display: none; padding: 40px 20px; max-width: 1200px; margin: auto; min-height: 80vh; }
        .active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* القائمة الرئيسية */
        .home-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px;
        }

        .nav-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; padding-bottom: 20px;
        }

        .nav-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .nav-card img { width: 100%; height: 200px; object-fit: cover; }
        .nav-card h3 { margin-top: 15px; color: var(--white); }

        /* الصفحات الداخلية */
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
        .back-btn { 
            background: var(--accent); color: var(--main-bg); border: none; 
            padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; 
        }

        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        .menu-list { display: flex; flex-direction: column; gap: 15px; }
        
        .item-btn {
            background: var(--card-bg); padding: 20px; border-radius: 12px;
            cursor: pointer; border: 2px solid transparent; transition: 0.3s;
        }
        .item-btn:hover, .item-btn.active-item { border-color: var(--accent); background: rgba(251, 191, 36, 0.1); }

        .display-box { background: var(--card-bg); padding: 30px; border-radius: 20px; text-align: center; }
        .display-box img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 15px; margin-bottom: 20px; display: none; border: 3px solid var(--accent); }
        .display-box p { color: var(--text-dim); font-size: 1.1rem; }

        footer { 
            background: #000; color: var(--white); text-align: center; 
            padding: 50px 20px; margin-top: 100px; border-top: 1px solid var(--card-bg);
        }
        .footer-content { line-height: 2; }
        .footer-content strong { color: var(--accent); }

        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>استكشف الأردن حيث الاصالة و العراقة اجتمعت في مكان واحد</h1>
</header>

<!-- الرئيسية -->
<div id="home" class="page active">
    <div class="home-grid">
        <div class="nav-card" onclick="openSection('recreational')">
            <img src="استجمامية.jpg" alt="استجمام">
            <h3>السياحة الاستجمامية</h3>
        </div>
        <div class="nav-card" onclick="openSection('medical')">
            <img src="ugh[.jpg" alt="علاج">
            <h3>السياحة العلاجية</h3>
        </div>
        <div class="nav-card" onclick="openSection('educational')">
            <img src="jugdl.jpg" alt="تعليم">
            <h3>السياحة التعليمية</h3>
        </div>
        <div class="nav-card" onclick="openSection('entertainment')">
            <img src="jvtdi.jpg" alt="ترفيه">
            <h3>السياحة الترفيهية</h3>
        </div>
        <div class="nav-card" onclick="openSection('food')">
            <img src="h;g.jpg" alt="أكل">
            <h3>أشهر الأكلات الأردنية</h3>
        </div>
        <div class="nav-card" onclick="openSection('historical')">
            <img src="hec.jpg" alt="آثار">
            <h3>المواقع الأثرية</h3>
        </div>
    </div>
</div>

<!-- المحتوى الفرعي -->
<div id="subPage" class="page">
    <div class="page-header">
        <h2 id="pageTitle" style="color: var(--accent);"></h2>
        <button class="back-btn" onclick="goHome()">🏠 رجوع للرئيسية</button>
    </div>
    <div class="layout">
        <div id="sideMenu" class="menu-list"></div>
        <div class="display-box">
            <img id="mainImg" src="" alt="الموقع">
            <h3 id="itemName" style="margin-bottom: 15px; color: var(--accent);"></h3>
            <p id="itemDesc"></p>
        </div>
    </div>
</div>

<footer>
    <div class="footer-content">
        <p>تصميم وإعداد</p>
        <p>الطالب: <strong>محمد محمد جهاد خياط</strong></p>
        <p>الرقم الجامعي: <strong>202511975</strong></p>
        <p>التخصص: <strong>هندسة البرمجيات</strong></p>
    </div>
</footer>

<script>
    const siteData = {
        recreational: {
            title: "السياحة الاستجمامية",
            items: [
                { name: "البحر الميت", desc: "أخفض نقطة في العالم ومختبر طبيعي لجمال البشرة والطفو فوق المياه المالحة.", img: "بحر.jpg" },
                { name: "وادي رم", desc: "صحراء وادي القمر، حيث الجبال الوردية والرمال الذهبية وتجربة التخييم المذهلة.", img: "واديرم.jpg" },
                { name: "العقبة", desc: "ثغر الأردن الباسم، مياه فيروزية وشعاب مرجانية خلابة تناسب الغواصين.", img: "العقبة.jpg" }
            ]
        },
        medical: {
            title: "السياحة العلاجية",
            items: [
                { name: "حمامات ماعين", desc: "شلالات مياه كبريتية حارة تنحدر من قمم الجبال لتعالج آلام المفاصل.", img: "lhudk.jpg" },
                { name: "مركز فرح الطبي", desc: "صرح طبي متطور يضع الأردن على خارطة الطب العالمية بجودة الخدمات والتقنيات.", img: "فرح.jpg" }
            ]
        },
        educational: {
            title: "السياحة التعليمية",
            items: [
                { name: "الجامعة الأردنية", desc: "أولى الجامعات الأردنية وأعرقها، صرح أكاديمي متميز في قلب العاصمة عمان.", img: "hlum.jpg" },
                { name: "اللغة العربية للأجانب", desc: "مراكز متخصصة تستقطب الطلاب من كل القارات لتعلم لغة الضاد في بيئة آمنة.", img: "uvfd.jpg" }
            ]
        },
        entertainment: {
            title: "السياحة الترفيهية",
            items: [
                { name: "البوليفارد - العبدلي", desc: "الوجهة العصرية للتسوق والترفيه، حيث تجتمع الحداثة بالفخامة في عمان.", img: "f,gdthv].jpg" },
                { name: "المدرج الروماني", desc: "مسرح تاريخي في قلب عمان القديمة، يتسع لآلاف المشاهدين ويعود للعصر الروماني.", img: "v,lhkd.jpg" }
            ]
        },
        food: {
            title: "المطبخ الأردني",
            items: [
                { name: "المنسف", desc: "الطبق الوطني بامتياز، يُصنع من الجميد الكركي واللحم البلدي، عنوان الكرم والجود.", img: "lkst.jpg" },
                { name: "الزرب", desc: "طعام يُطهى تحت الأرض في حفر خاصة في وادي رم، يتميز بطعم الشواء المدخن.", img: "zarb.jpg" }
            ]
        },
        historical: {
            title: "المواقع الأثرية",
            items: [
                { name: "البترا", desc: "المدينة الوردية المنحوتة في الصخر، فخر السياحة الأردنية وإحدى عجائب الدنيا.", img: "batra.jpg" },
                { name: "جرش", desc: "مدينة الألف عمود، بوابة عبر الزمن تأخذك إلى العصر الروماني بساحاتها ومسارحها.", img: "جرش.jpg" }
            ]
        }
    };

    function openSection(id) {
        document.getElementById('home').classList.remove('active');
        const section = siteData[id];
        document.getElementById('pageTitle').innerText = section.title;
        const menu = document.getElementById('sideMenu');
        menu.innerHTML = '';

        // تصفير العرض
        document.getElementById('mainImg').style.display = 'none';
        document.getElementById('itemName').innerText = 'اختر من القائمة';
        document.getElementById('itemDesc').innerText = 'اضغط على أحد الخيارات لعرض التفاصيل والصور.';

        section.items.forEach((item, index) => {
            const btn = document.createElement('div');
            btn.className = 'item-btn';
            btn.innerText = item.name;
            btn.onclick = () => {
                document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('active-item'));
                btn.classList.add('active-item');
                const img = document.getElementById('mainImg');
                img.src = item.img;
                img.style.display = 'block';
                document.getElementById('itemName').innerText = item.name;
                document.getElementById('itemDesc').innerText = item.desc;
            };
            menu.appendChild(btn);
        });

        document.getElementById('subPage').classList.add('active');
        window.scrollTo(0,0);
    }

    function goHome() {
        document.getElementById('subPage').classList.remove('active');
        document.getElementById('home').classList.add('active');
    }
</script>

</body>
</html>
